{% extends 'base.html' %}
{% block title %}Request Item{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-4">Request an Item</h1>

<form method="post" class="bg-white p-6 rounded shadow max-w-md">
  {% csrf_token %}

  <label class="block mb-2 text-sm font-medium">Select Item</label>
  <select name="item" required class="w-full p-2 border rounded mb-4">
    <option value="">-- Choose an item --</option>
    {% for item in items %}
      <option value="{{ item.id }}">{{ item.name }} ({{ item.quantity_in_stock }} in stock)</option>
    {% endfor %}
  </select>

  <label class="block mb-2 text-sm font-medium">Quantity</label>
  <input type="number" name="quantity" min="1" required class="w-full p-2 border rounded mb-4">

  <label class="block mb-2 text-sm font-medium">Purpose</label>
  <textarea name="purpose" rows="3" class="w-full p-2 border rounded mb-4"></textarea>

  <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Submit Request</button>
</form>
{% endblock %}
