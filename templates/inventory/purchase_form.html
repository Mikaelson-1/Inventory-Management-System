{% extends 'base.html' %}
{% block title %}New Purchase{% endblock %}
{% block content %}

<h1 class="text-2xl font-bold mb-4">New Purchase</h1>

<form method="post" class="bg-white p-6 rounded shadow max-w-xl">
  {% csrf_token %}

  <label class="block mb-2">Supplier</label>
  <select name="supplier" class="w-full mb-4 border px-4 py-2 rounded" required>
    {% for s in suppliers %}
    <option value="{{ s.id }}">{{ s.name }}</option>
    {% endfor %}
  </select>

  <label class="block mb-2">Item</label>
  <select name="item" class="w-full mb-4 border px-4 py-2 rounded" required>
    {% for i in items %}
    <option value="{{ i.id }}">{{ i.name }}</option>
    {% endfor %}
  </select>

  <label class="block mb-2">Quantity</label>
  <input type="number" name="quantity" class="w-full mb-4 border px-4 py-2 rounded" required>

  <label class="block mb-2">Cost Price</label>
  <input type="number" step="0.01" name="cost_price" class="w-full mb-6 border px-4 py-2 rounded" required>

  <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Save Purchase</button>
  <a href="{% url 'purchase_list' %}" class="ml-4 text-gray-500 hover:underline">Cancel</a>
</form>

{% endblock %}
