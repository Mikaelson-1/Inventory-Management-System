{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="max-w-xl mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-2xl font-bold mb-4 text-bouesti-green">Request Item</h2>

  <form method="POST">
    {% csrf_token %}

    <label class="block mb-2 font-semibold text-gray-700">Select Item</label>
    <select name="item" required class="w-full mb-4 p-2 border rounded">
      <option value="">-- Choose an item --</option>
      {% for item in items %}
        <option value="{{ item.id }}">{{ item.name }} (Available: {{ item.quantity_in_stock }})</option>
      {% endfor %}
    </select>

    <label class="block mb-2 font-semibold text-gray-700">Quantity</label>
    <input type="number" name="quantity" min="1" required class="w-full mb-4 p-2 border rounded">

    <label class="block mb-2 font-semibold text-gray-700">Purpose</label>
    <textarea name="purpose" rows="4" required class="w-full mb-4 p-2 border rounded"></textarea>

    <button type="submit" class="bg-bouesti-green hover:bg-green-700 text-white px-4 py-2 rounded">
      Submit Request
    </button>
  </form>
</div>
{% endblock %}
