{% extends 'base.html' %}
{% block title %}{{ action }} Supplier{% endblock %}
{% block content %}

<h1 class="text-2xl font-bold mb-4">{{ action }} Supplier</h1>

<form method="post" class="bg-white p-6 rounded shadow max-w-xl">
  {% csrf_token %}

  <label class="block mb-2">Supplier Name</label>
  <input type="text" name="name" value="{{ supplier.name|default:'' }}" class="w-full mb-4 border px-4 py-2 rounded" required>

  <label class="block mb-2">Contact Person</label>
  <input type="text" name="contact_person" value="{{ supplier.contact_person|default:'' }}" class="w-full mb-4 border px-4 py-2 rounded">

  <label class="block mb-2">Phone</label>
  <input type="text" name="phone" value="{{ supplier.phone|default:'' }}" class="w-full mb-4 border px-4 py-2 rounded">

  <label class="block mb-2">Email</label>
  <input type="email" name="email" value="{{ supplier.email|default:'' }}" class="w-full mb-4 border px-4 py-2 rounded">

  <label class="block mb-2">Address</label>
  <textarea name="address" rows="3" class="w-full mb-6 border px-4 py-2 rounded">{{ supplier.address|default:'' }}</textarea>

  <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">{{ action }}</button>
  <a href="{% url 'supplier_list' %}" class="ml-4 text-gray-500 hover:underline">Cancel</a>
</form>

{% endblock %}
