{% extends 'base.html' %}
{% block title %}Categories{% endblock %}
{% block content %}

<div class="flex justify-between mb-4">
  <h1 class="text-2xl font-bold">Inventory Categories</h1>
  <a href="{% url 'category_create' %}" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
    <i class="bi bi-plus-circle"></i> Add Category
  </a>
</div>

<table class="w-full bg-white rounded shadow">
  <thead class="bg-gray-100 text-sm">
    <tr>
      <th class="p-3 text-left">Name</th>
      <th class="p-3 text-left">Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for cat in categories %}
    <tr class="border-t">
      <td class="p-3">{{ cat.name }}</td>
      <td class="p-3 space-x-2">
        <a href="{% url 'category_edit' cat.id %}" class="text-blue-600"><i class="bi bi-pencil-square"></i></a>
        <a href="{% url 'category_delete' cat.id %}" class="text-red-600" onclick="return confirm('Delete this category?')"><i class="bi bi-trash"></i></a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
