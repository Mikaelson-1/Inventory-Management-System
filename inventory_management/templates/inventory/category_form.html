{% extends 'base.html' %}
{% block title %}{{ action }} Category{% endblock %}
{% block content %}

<h1 class="text-2xl font-bold mb-4">{{ action }} Category</h1>

<form method="post" class="bg-white p-6 rounded shadow max-w-md">
  {% csrf_token %}

  <label class="block mb-2">Name</label>
  <input type="text" name="name" value="{{ category.name|default:'' }}" class="w-full mb-6 border px-4 py-2 rounded" required>

  <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">{{ action }}</button>
  <a href="{% url 'category_list' %}" class="ml-4 text-gray-500 hover:underline">Cancel</a>
</form>

{% endblock %}
