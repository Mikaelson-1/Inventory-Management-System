{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | UIMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="{% static 'images/logo.png' %}">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen px-4">

  <div class="bg-white p-8 rounded shadow-md w-full max-w-sm text-center">
    
    <!-- BOUESTI Logo -->
    <div class="flex justify-center mb-4">
      <img src="{% static 'images/logo.png' %}" alt="BOUESTI Logo" class="h-20 w-auto">
    </div>

    <h2 class="text-2xl font-bold mb-4 text-gray-800">University Inventory Login</h2>

    {% if request.user.is_authenticated %}
      {% if messages %}
        <div class="mb-4 text-sm">
          {% for message in messages %}
            <p class="text-red-600">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endif %}

    <form method="post" class="text-left">
      {% csrf_token %}

      <label class="block mb-1 text-sm font-medium text-gray-700">Username</label>
      <input type="text" name="username" required class="w-full border px-4 py-2 mb-4 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">

      <label class="block mb-1 text-sm font-medium text-gray-700">Password</label>
      <input type="password" name="password" required class="w-full border px-4 py-2 mb-6 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">

    <button type="submit"
      class="w-full bg-[#006400] text-white py-2 rounded hover:bg-green-800 transition-all font-semibold">
      Login
    </button>
    </form>
  </div>

</body>
</html>
